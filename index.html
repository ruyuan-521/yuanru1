<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>渊茹</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Noto Sans SC', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-glow {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(88, 28, 135, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
      animation: drift 15s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-5%, 3%) rotate(5deg); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 60px 50px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
      animation: cardIn 0.8s ease-out;
    }

    @keyframes cardIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #581c87, #3b82f6);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 30px rgba(88, 28, 135, 0.4);
      position: relative;
      overflow: hidden;
    }

    .avatar::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(25deg); }
      100% { transform: translateX(100%) rotate(25deg); }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .bio {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
      font-weight: 300;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      text-decoration: none;
      color: #ccc;
      font-size: 15px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: left 0.5s ease;
    }

    .social-link:hover::before {
      left: 100%;
    }

    .social-link:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      color: #fff;
      transform: translateX(6px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .social-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .social-icon.wechat { background: rgba(7, 193, 96, 0.15); color: #07C160; }
    .social-icon.weibo { background: rgba(230, 48, 53, 0.15); color: #E63035; }
    .social-icon.bilibili { background: rgba(251, 114, 153, 0.15); color: #FB7299; }
    .social-icon.twitter { background: rgba(29, 161, 242, 0.15); color: #1DA1F2; }
    .social-icon.github { background: rgba(255, 255, 255, 0.08); color: #fff; }
    .social-icon.email { background: rgba(234, 179, 8, 0.15); color: #EAB308; }
    .social-icon.instagram { background: rgba(225, 48, 108, 0.15); color: #E1306C; }
    .social-icon.douyin { background: rgba(255, 255, 255, 0.08); color: #fff; }
    .social-icon.qq { background: rgba(18, 150, 219, 0.15); color: #1296DB; }

    /* QR Modal */
    .qr-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .qr-content {
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      max-width: 300px;
      width: 85%;
      animation: popIn 0.3s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .qr-content img {
      width: 200px;
      height: 200px;
      border-radius: 12px;
      margin-bottom: 16px;
      object-fit: cover;
    }

    .qr-content p {
      color: #888;
      font-size: 14px;
    }

    .qr-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .qr-close:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .social-label {
      text-align: left;
    }

    .social-label .name {
      font-weight: 400;
      font-size: 15px;
    }

    .social-label .handle {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .social-arrow {
      margin-left: auto;
      color: #444;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .social-link:hover .social-arrow {
      color: #888;
      transform: translateX(4px);
    }

    .footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #333;
      z-index: 1;
    }

    @media (max-width: 480px) {
      .card {
        padding: 40px 30px;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

  <script>

      particle.classList.add('particle');
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
      particle.style.animationDelay = (Math.random() * 10) + 's';
      particle.style.width = (Math.random() * 3 + 1) + 'px';
      particle.style.height = particle.style.width;
      particlesContainer.appendChild(particle);
